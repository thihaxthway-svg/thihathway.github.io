<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solar System Explorer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600&family=Space+Mono:wght@400;700&display=swap');
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#050508;--panel:rgba(6,8,16,0.92);--border:rgba(100,130,200,0.12);--text:#c8cedf;--dim:#6a7094;--acc:#5a9aff;--glow:rgba(90,154,255,0.2)}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;overflow:hidden;width:100vw;height:100vh;cursor:grab}
body:active{cursor:grabbing}
canvas{display:block}
#ld{position:fixed;inset:0;z-index:1000;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 1s}
#ld.done{opacity:0;pointer-events:none}
#ld h1{font-weight:200;font-size:clamp(1.4rem,3.5vw,2.4rem);letter-spacing:.35em;color:var(--text);margin-bottom:1.5rem;text-transform:uppercase}
.ld-credit{font-weight:300;font-size:.7rem;letter-spacing:.15em;color:var(--dim);margin-top:1.2rem}
.bar{width:200px;height:2px;background:var(--border);border-radius:1px;overflow:hidden}
.bar::after{content:'';display:block;width:35%;height:100%;background:var(--acc);animation:ld 1s ease-in-out infinite}
@keyframes ld{0%{transform:translateX(-110%)}100%{transform:translateX(380%)}}
#hud{position:fixed;top:0;left:0;right:0;padding:1rem 1.4rem;display:flex;justify-content:space-between;align-items:flex-start;pointer-events:none;z-index:10}
.ht{font-weight:200;font-size:.65rem;letter-spacing:.35em;text-transform:uppercase;color:var(--dim);user-select:none}
.ht-left{display:flex;flex-direction:column;gap:.15rem}
.ht-title{font-weight:200;font-size:.85rem;letter-spacing:.4em;text-transform:uppercase;color:var(--text);user-select:none}
.ht-credit{font-weight:300;font-size:.52rem;letter-spacing:.18em;color:var(--dim);user-select:none}
#nav{position:fixed;bottom:1.2rem;left:50%;transform:translateX(-50%);display:flex;gap:.2rem;background:var(--panel);border:1px solid var(--border);border-radius:100px;padding:.3rem .45rem;backdrop-filter:blur(20px);z-index:10;max-width:96vw;overflow-x:auto;scrollbar-width:none}
#nav::-webkit-scrollbar{display:none}
.nb{background:none;border:none;color:var(--dim);font-family:'Outfit',sans-serif;font-size:.62rem;font-weight:400;padding:.3rem .5rem;border-radius:100px;cursor:pointer;transition:all .25s;white-space:nowrap}
.nb:hover{color:var(--text);background:rgba(90,154,255,.07)}
.nb.on{color:#fff;background:rgba(90,154,255,.18);box-shadow:0 0 10px var(--glow)}
.nb .d{display:inline-block;width:5px;height:5px;border-radius:50%;margin-right:3px;vertical-align:middle}
.nb-wrap{position:relative;display:inline-flex}
.moon-pop{position:fixed;display:flex;flex-direction:column;gap:.15rem;background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:.3rem;backdrop-filter:blur(24px);opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;white-space:nowrap;z-index:25}
.moon-pop.show{opacity:1;pointer-events:auto}
.moon-pop::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:var(--border)}
.mb{background:none;border:none;color:var(--dim);font-family:'Outfit',sans-serif;font-size:.56rem;font-weight:400;padding:.25rem .5rem;border-radius:100px;cursor:pointer;transition:all .25s;white-space:nowrap;text-align:left}
.mb:hover{color:var(--text);background:rgba(90,154,255,.07)}
.mb.on{color:#fff;background:rgba(90,154,255,.18)}
.mb .d{display:inline-block;width:4px;height:4px;border-radius:50%;margin-right:3px;vertical-align:middle}
#pnl{position:fixed;top:50%;right:1.2rem;transform:translateY(-50%);width:265px;background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:1.4rem;backdrop-filter:blur(24px);z-index:10;opacity:0;transition:opacity .4s;pointer-events:none}
#pnl.on{opacity:1;pointer-events:auto}
#pnl-close{position:absolute;top:.6rem;right:.6rem;background:none;border:none;color:var(--dim);font-size:.75rem;cursor:pointer;width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:all .2s}
#pnl-close:hover{color:var(--text);background:rgba(255,255,255,.08)}
#pnl h2{font-weight:300;font-size:1.2rem;margin-bottom:.2rem}
#pnl .sub{font-size:.58rem;letter-spacing:.2em;text-transform:uppercase;color:var(--dim);margin-bottom:1rem}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:.6rem}
.sg label{display:block;font-size:.5rem;text-transform:uppercase;letter-spacing:.12em;color:var(--dim);margin-bottom:.1rem}
.sg value{display:block;font-family:'Space Mono',monospace;font-size:.72rem}
#pdesc{margin-top:.8rem;font-size:.7rem;line-height:1.5;color:var(--dim);border-top:1px solid var(--border);padding-top:.7rem}
#tc{position:fixed;bottom:4rem;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:.5rem;z-index:10}
.tb{background:var(--panel);border:1px solid var(--border);color:var(--dim);width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.6rem;transition:all .2s;backdrop-filter:blur(12px)}
.tb:hover{color:var(--text)}.tb.on{color:var(--acc);border-color:var(--acc)}
#bl.on{color:#ff4444;border-color:#ff4444;animation:pulse 1.5s ease infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,68,68,.3)}50%{box-shadow:0 0 8px 2px rgba(255,68,68,.25)}}
#tl{font-family:'Space Mono',monospace;font-size:.6rem;color:var(--dim);min-width:40px;text-align:center}
#tip{position:fixed;padding:.2rem .5rem;background:var(--panel);border:1px solid var(--border);border-radius:5px;font-size:.62rem;color:var(--text);pointer-events:none;z-index:20;opacity:0;transition:opacity .1s;white-space:nowrap}
@media(max-width:768px){#pnl{top:3.2rem;right:auto;left:50%;transform:translateX(-50%);width:calc(100vw - 2rem);max-width:320px;max-height:55vh;overflow-y:auto;border-radius:12px;padding:1rem}#pnl.on{transform:translateX(-50%)}.nb{font-size:.5rem;padding:.2rem .3rem}.mb{font-size:.48rem;padding:.2rem .35rem}}
</style>
</head>
<body>
<div id="ld"><h1>Solar System</h1><div class="bar"></div><div class="ld-credit">created by Thiha Thway</div></div>
<div id="hud"><div class="ht-left"><div class="ht-title">Solar System Explorer</div><div class="ht-credit">created by Thiha Thway</div></div><div class="ht" id="dd"></div></div>
<div id="tip"></div>
<div id="tc"><button class="tb" id="bs">◂◂</button><button class="tb" id="bp">❚❚</button><button class="tb" id="bf">▸▸</button><span id="tl">0.01×</span><button class="tb" id="bl" title="Sync to real time" style="font-size:.45rem;letter-spacing:.05em;width:38px">LIVE</button></div>
<div id="nav"></div>
<div id="pnl"><button id="pnl-close" onclick="document.getElementById('pnl').classList.remove('on')">✕</button><h2 id="pn"></h2><div class="sub" id="pt"></div><div class="sg" id="ps"></div><div id="pdesc"></div></div>

function mkEuropaTex(){
  const W=512,H=256,cv=document.createElement('canvas');cv.width=W;cv.height=H;
  const c=cv.getContext('2d');
  const N=mkN(6111),N2=mkN(7222),N3=mkN(8333);

  // Pass 1: Base icy surface
  for(let py=0;py<H;py++)for(let px=0;px<W;px++){
    const u=px/W,v=py/H;
    const n1=N.fb(u*3+10,v*3+10,4)*.5+.5;
    const n2=N.fb(u*6+20,v*6+20,3)*.5+.5;
    let r=200+n1*35+n2*12;
    let g=205+n1*30+n2*10;
    let b=215+n1*25+n2*8;
    const warm=N.fb(u*2.5+50,v*2.5+50,3)*.5+.5;
    if(warm>.55){const wf=(warm-.55)/.45;r+=wf*25;g+=wf*10;b-=wf*20;}
    const cool=N2.fb(u*2+70,v*2+70,3)*.5+.5;
    if(cool<.4){const cf=(.4-cool)/.4;r-=cf*15;g-=cf*8;b+=cf*8;}
    c.fillStyle=`rgb(${r|0},${g|0},${b|0})`;
    c.fillRect(px,py,1,1);
  }

  // Pass 2: Brown/reddish lineae — grid-distributed with wrapping
  c.lineCap='round';
  const drawLinea=(seed,cols,rows,minW,maxW,rr,gg,bb,alpha,lenMin,lenMax)=>{
    const LN=mkN(seed);
    let idx=0;
    for(let gy=0;gy<rows;gy++)for(let gx=0;gx<cols;gx++){
      idx++;
      // Grid cell with jitter for even distribution
      const jx=(LN.fb(idx*3.7,seed*.01,2)*.5+.5)*.8+.1;
      const jy=(LN.fb(seed*.01,idx*3.7,2)*.5+.5)*.8+.1;
      const sx=((gx+jx)/cols)*W;
      const sy=((gy+jy)/rows)*H;
      const ang=(LN.fb(idx*2.1,idx*1.3+seed,2)*.5+.5)*Math.PI;
      const len=lenMin+(LN.fb(idx*4.5,10+seed,2)*.5+.5)*(lenMax-lenMin);
      const w=minW+(maxW-minW)*(LN.fb(idx*5,20+seed,2)*.5+.5);
      const steps=Math.floor(len/3);
      c.strokeStyle=`rgba(${rr},${gg},${bb},${alpha})`;
      c.lineWidth=w;
      // Draw with horizontal wrapping (draw 3 copies offset by -W, 0, +W)
      for(let wr=-1;wr<=1;wr++){
        c.beginPath();
        let cx2=sx+wr*W,cy=sy,a=ang;
        c.moveTo(cx2,cy);
        for(let s=0;s<steps;s++){
          a+=LN.fb(((cx2%W+W)%W)*.008+seed,cy*.008,3)*.35;
          cx2+=Math.cos(a)*3;cy+=Math.sin(a)*3;
          c.lineTo(cx2,cy);
        }
        c.stroke();
      }
    }
  };
  // Dark brown major lineae — thick, long
  drawLinea(3001,10,6,.8,2.8,120,65,35,.65,120,350);
  // Medium brown lineae
  drawLinea(3501,12,8,.4,1.6,140,80,45,.5,80,250);
  // Reddish-brown fine lineae
  drawLinea(4001,16,10,.2,.9,155,85,50,.4,50,180);
  // Very fine hairline cracks — dense coverage
  drawLinea(4501,20,14,.1,.45,130,75,45,.3,30,120);
  // Warm orange-brown stain lines
  drawLinea(5001,8,6,.5,2.0,165,95,45,.22,80,200);
  // Extra fine detail layer
  drawLinea(5501,24,16,.08,.3,140,80,50,.2,20,80);

  // Pass 3: Brown stained patches (chaos regions) — distributed
  for(let gy=0;gy<3;gy++)for(let gx=0;gx<4;gx++){
    const i=gy*4+gx;
    const px2=((gx+.5)/4)*W+(N3.fb(i*7,100,2)-.0)*W*.15;
    const py2=((gy+.5)/3)*H+(N3.fb(100,i*7,2)-.0)*H*.15;
    const rad=8+Math.abs(N3.fb(i*3,200,2))*25;
    const grad=c.createRadialGradient(px2,py2,0,px2,py2,rad);
    grad.addColorStop(0,'rgba(145,82,42,0.35)');
    grad.addColorStop(.5,'rgba(155,95,55,0.18)');
    grad.addColorStop(1,'rgba(155,95,55,0)');
    c.fillStyle=grad;c.fillRect(px2-rad,py2-rad,rad*2,rad*2);
  }

  // Pass 4: Fine ice texture grain
  for(let py=0;py<H;py++)for(let px=0;px<W;px++){
    const grain=N2.fb(px*.05+300,py*.05+300,2);
    if(Math.abs(grain)<.15){
      c.fillStyle=`rgba(255,255,255,${.04*(1-Math.abs(grain)/.15)})`;
      c.fillRect(px,py,1,1);
    }
  }

  const tex=new THREE.CanvasTexture(cv);tex.colorSpace=THREE.SRGBColorSpace;
  return tex;
}

/*════════ IO TEXTURE — volcanic yellow/orange/red/black ════════*/
function mkIoTex(){
  const W=512,H=256,cv=document.createElement('canvas');cv.width=W;cv.height=H;
  const c=cv.getContext('2d');
  const N=mkN(9001),N2=mkN(9502);
  for(let py=0;py<H;py++)for(let px=0;px<W;px++){
    const u=px/W,v=py/H;
    const n1=N.fb(u*4+5,v*4+5,4)*.5+.5;
    const n2=N.fb(u*8+15,v*8+15,3)*.5+.5;
    const n3=N2.fb(u*6+25,v*6+25,4)*.5+.5;
    // Base: sulfur yellow
    let r=220+n1*30,g=195+n1*25,b=80+n1*30;
    // Orange-red volcanic regions
    if(n2>.6){const f=(n2-.6)/.4;r=220+f*35;g=140-f*60;b=40-f*30;}
    // Dark volcanic calderas
    if(n3>.78){const f=(n3-.78)/.22;r=r*(1-f*.7);g=g*(1-f*.8);b=b*(1-f*.6);}
    // White/pale SO2 frost patches
    const frost=N2.fb(u*3+50,v*3+50,3)*.5+.5;
    if(frost>.7){const f=(frost-.7)/.3;r=r+(255-r)*f*.4;g=g+(255-g)*f*.35;b=b+(230-b)*f*.3;}
    // Greenish sulfur
    if(n1>.5&&n1<.6&&n2<.5){g+=15;r-=10;}
    c.fillStyle=`rgb(${Math.max(0,Math.min(255,r))|0},${Math.max(0,Math.min(255,g))|0},${Math.max(0,Math.min(255,b))|0})`;
    c.fillRect(px,py,1,1);
  }
  // Volcanic spots
  for(let i=0;i<20;i++){
    const vx=N.fb(i*11,500,2)*W,vy=N.fb(500,i*11,2)*H;
    const vr=3+N.fb(i*7,600,2)*8;
    const grad=c.createRadialGradient(vx,vy,0,vx,vy,vr);
    grad.addColorStop(0,'rgba(40,15,5,0.8)');
    grad.addColorStop(.4,'rgba(180,60,15,0.5)');
    grad.addColorStop(.7,'rgba(220,160,30,0.25)');
    grad.addColorStop(1,'rgba(220,180,50,0)');
    c.fillStyle=grad;c.fillRect(vx-vr,vy-vr,vr*2,vr*2);
  }
  const tex=new THREE.CanvasTexture(cv);tex.colorSpace=THREE.SRGBColorSpace;
  return tex;
}

function mkRing(cnt,rMin,rMax,hF,mS,cs,al){const pos=new Float32Array(cnt*3),siz=new Float32Array(cnt);for(let i=0;i<cnt;i++){const dist=(rMin+Math.random()*(rMax-rMin))*AU,a=Math.random()*Math.PI*2;pos[i*3]=Math.cos(a)*dist;pos[i*3+1]=(Math.random()-.5)*AU*hF;pos[i*3+2]=Math.sin(a)*dist;siz[i]=.15+Math.random()*mS;}const g=new THREE.BufferGeometry();g.setAttribute('position',new THREE.BufferAttribute(pos,3));g.setAttribute('size',new THREE.BufferAttribute(siz,1));const pts=new THREE.Points(g,new THREE.ShaderMaterial({uniforms:{u:{value:R.getPixelRatio()}},vertexShader:`attribute float size;uniform float u;void main(){vec4 m=modelViewMatrix*vec4(position,1.);gl_PointSize=clamp(size*u*(80./-m.z),.3,4.5);gl_Position=projectionMatrix*m;}`,fragmentShader:`void main(){float d=length(gl_PointCoord-.5)*2.;if(d>1.)discard;gl_FragColor=vec4(${cs},(1.-d)*${al});}`,transparent:1,depthWrite:0}));sc.add(pts);return pts;}

    // Main nav button toggles popup

    mainB.innerHTML=`<span class="d" style="background:${pColors[pi]}"></span>${p.n} ▾`;
    mainB.onclick=e=>{e.stopPropagation();
      if(_openPop===pop){pop.classList.remove('show');_openPop=null;}
      else{
        if(_openPop)_openPop.classList.remove('show');
        // Position popup above the button
        const r=mainB.getBoundingClientRect();
        pop.style.left=(r.left+r.width/2)+'px';
        pop.style.bottom=(window.innerHeight-r.top+8)+'px';
        pop.style.transform='translateX(-50%)';
        pop.classList.add('show');
        _openPop=pop;
      }
    };
    wrap.appendChild(mainB);
    allBtns['nav_p'+pi]=mainB;
  } else {
    allBtns['p'+pi]=mkBtn(p.n,pColors[pi],()=>focus(pi));
  }
});

mkSep();
// Belts
allBtns.ast=mkBtn('Asteroids','#8a7a60',()=>flyA());
allBtns.kui=mkBtn('Kuiper','#58a',()=>flyK());
allBtns.oor=mkBtn('Oort','#456',()=>flyO());
mkSep();
// Dwarfs
const dwColors=['#c8b898','#ccd','#a98','#dde'];
DW.forEach((d,di)=>{allBtns['dw'+di]=mkBtn(d.n,dwColors[di],()=>focus(8+di));});

window._navBtns=allBtns;
}

let foc=null,fi=-1,cT=null;
function setAct(key){if(!window._navBtns)return;const a=window._navBtns;
  // Clear all .on from .nb and .mb
  document.querySelectorAll('.nb,.mb').forEach(x=>x.classList.remove('on'));
  if(a[key])a[key].classList.add('on');
  // Also highlight the parent nav button for moons and their planets
  if((key==='moon'||key==='p2')&&a['nav_p2'])a['nav_p2'].classList.add('on');
  if(((key&&key.startsWith('jm'))||key==='p4')&&a['nav_p4'])a['nav_p4'].classList.add('on');
}
function focus(i){const b=bodies[i];fi=i;foc=b;setAct(i<8?'p'+i:'dw'+(i-8));showP(b.dd);const w=new THREE.Vector3();b.mesh.getWorldPosition(w);const d=Math.max(b.vr*6,3);cT={s:cam.position.clone(),e:w.clone().add(new THREE.Vector3(d*.7,d*.4,d)),tl:w.clone(),sl:ctl.target.clone(),p:0,dur:1.5};}
function flySun(){fi=-1;foc=null;setAct('sun');showR('Sun','G2V Star','Hot plasma sphere. Fusion converts H→He. 4.6 billion years old.',{'Diameter':'1,391,000 km','Mass':'1.989×10³⁰ kg','Surface':'5,500°C','Core':'15M°C','Age':'4.6 Gyr','Type':'G2V'});cT={s:cam.position.clone(),e:new THREE.Vector3(20,12,25),tl:new THREE.Vector3(),sl:ctl.target.clone(),p:0,dur:1.5};}
function flyAll(){fi=-1;foc=null;setAct('all');document.getElementById('pnl').classList.remove('on');cT={s:cam.position.clone(),e:new THREE.Vector3(250,180,350),tl:new THREE.Vector3(),sl:ctl.target.clone(),p:0,dur:1.8};}
function flyK(){fi=-1;foc=null;setAct('kui');showR('Kuiper Belt','Trans-Neptunian','Icy disc 30–55 AU. 100,000+ objects >100 km. Source of short-period comets.',{'Distance':'30–55 AU','Mass':'~0.1 M⊕','Objects':'~2,000+','Largest':'Pluto','Temp':'−230°C','Ices':'H₂O, CH₄, NH₃'});cT={s:cam.position.clone(),e:new THREE.Vector3(42*AU*.5,42*AU*.35,42*AU*.6),tl:new THREE.Vector3(),sl:ctl.target.clone(),p:0,dur:2};}
function flyO(){fi=-1;foc=null;setAct('oor');showR('Oort Cloud','Hypothetical Shell','Spherical shell at 2,000–100,000 AU. Trillions of icy bodies. Never directly observed.',{'Distance':'2k–100k AU','Edge':'~1.6 ly','Pop.':'~2 trillion','Mass':'~5 M⊕','Temp':'−270°C','Status':'Hypothetical'});const d=350*AU;cT={s:cam.position.clone(),e:new THREE.Vector3(d*.3,d*.25,d*.4),tl:new THREE.Vector3(),sl:ctl.target.clone(),p:0,dur:2.5};}
function flyA(){fi=-1;foc=null;setAct('ast');showR('Asteroid Belt','Main Belt','Rocky debris between Mars and Jupiter (2.1–3.3 AU). Contains millions of asteroids, from tiny rocks to dwarf planet Ceres (940 km). Total mass is only ~4% of the Moon. Remnants of the early solar system that never coalesced into a planet due to Jupiter\'s gravitational influence.',{'Distance':'2.1–3.3 AU','Width':'~1 AU','Est. Objects':'1.1–1.9 million >1 km','Total Mass':'~4% of Moon','Largest':'Ceres (940 km)','Composition':'Rock, metal, carbon'});const d=2.8*AU;cT={s:cam.position.clone(),e:new THREE.Vector3(d*.8,d*.5,d*.9),tl:new THREE.Vector3(d*.3,0,0),sl:ctl.target.clone(),p:0,dur:1.8};}

function flyMoon(){fi=-1;foc=null;setAct('moon');
  if(!window._moon)return;
  showR('Moon','Natural Satellite','Earth\'s only natural satellite. Tidally locked — same face always toward Earth. Maria (dark basaltic plains) cover 31% of nearside. Formed ~4.5 Gyr ago from giant impact. Surface scarred by billions of years of bombardment.',{'Diameter':'3,474 km','Mass':'7.34×10²² kg','Distance':'384,400 km','Gravity':'1.62 m/s²','Orbital Period':'27.3 days','Surface Temp':'−173 to 127°C'});
  const m=window._moon,w=new THREE.Vector3();m.mesh.getWorldPosition(w);
  const d=Math.max(m.vr*8,2);
  cT={s:cam.position.clone(),e:w.clone().add(new THREE.Vector3(d*.7,d*.4,d)),tl:w.clone(),sl:ctl.target.clone(),p:0,dur:1.5};
  // Track Moon
  foc={mesh:m.mesh,vr:m.vr};}

function flyJMoon(idx){fi=-1;foc=null;
  if(!window._jmoons||!window._jmoons[idx])return;
  const jm=window._jmoons[idx];
  setAct('jm'+idx);
  showR(jm.name,'Galilean Moon · Jupiter',jm.desc,jm.st);
  const w=new THREE.Vector3();jm.mesh.getWorldPosition(w);
  const d=Math.max(jm.vr*8,2);
  cT={s:cam.position.clone(),e:w.clone().add(new THREE.Vector3(d*.7,d*.4,d)),tl:w.clone(),sl:ctl.target.clone(),p:0,dur:1.5};
  foc={mesh:jm.mesh,vr:jm.vr};}

function showP(d){document.getElementById('pn').textContent=d.n;document.getElementById('pt').textContent=d.t;document.getElementById('pdesc').textContent=d.desc;let s='';for(const[k,v]of Object.entries(d.st))s+=`<div class="stat"><label>${k}</label><value>${v}</value></div>`;document.getElementById('ps').innerHTML=s;document.getElementById('pnl').classList.add('on');}
function showR(n,t,d,st){document.getElementById('pn').textContent=n;document.getElementById('pt').textContent=t;document.getElementById('pdesc').textContent=d;let s='';for(const[k,v]of Object.entries(st))s+=`<div class="stat"><label>${k}</label><value>${v}</value></div>`;document.getElementById('ps').innerHTML=s;document.getElementById('pnl').classList.add('on');}

/*════════ RAYCASTER ════════*/
const ray=new THREE.Raycaster(),ms=new THREE.Vector2(),tip=document.getElementById('tip');
R.domElement.onmousemove=e=>{ms.x=(e.clientX/innerWidth)*2-1;ms.y=-(e.clientY/innerHeight)*2+1;ray.setFromCamera(ms,cam);const h=ray.intersectObjects(clicks);if(h.length){const ud=h[0].object.userData;tip.textContent=ud.isMoon?'Moon':ud.isJMoon?window._jmoons[ud.jmi].name:bodies[ud.bi].dd.n;tip.style.left=(e.clientX+14)+'px';tip.style.top=(e.clientY-8)+'px';tip.style.opacity='1';R.domElement.style.cursor='pointer';}else{tip.style.opacity='0';R.domElement.style.cursor='grab';}};
R.domElement.onclick=()=>{ray.setFromCamera(ms,cam);const h=ray.intersectObjects(clicks);if(h.length){const ud=h[0].object.userData;if(ud.isMoon)flyMoon();else if(ud.isJMoon)flyJMoon(ud.jmi);else focus(ud.bi);}};

/*════════ TIME ════════*/
let ts=.01,paused=0,liveMode=0;const spds=[.001,.005,.01,.025,.05,.1,.25,.5,1,2,5,10,25,50,100];let si=2;
const bP=document.getElementById('bp'),bS=document.getElementById('bs'),bF=document.getElementById('bf'),bL=document.getElementById('bl'),tLab=document.getElementById('tl');
bP.onclick=()=>{if(liveMode){exitLive();return;}paused=!paused;bP.textContent=paused?'▶':'❚❚';bP.classList.toggle('on',paused);};
bS.onclick=()=>{exitLive();si=Math.max(0,si-1);ts=spds[si];tLab.textContent=ts+'×';};
bF.onclick=()=>{exitLive();si=Math.min(spds.length-1,si+1);ts=spds[si];tLab.textContent=ts+'×';};
bL.onclick=()=>{
  liveMode=!liveMode;bL.classList.toggle('on',liveMode);
  if(liveMode){
    // Set sim to current real date
    const now=new Date();
    simD=(now.getTime()-sd0.getTime())/864e5;
    paused=0;bP.textContent='❚❚';bP.classList.remove('on');
    tLab.textContent='LIVE';
  }else{tLab.textContent=ts+'×';}
};
function exitLive(){if(liveMode){liveMode=0;bL.classList.remove('on');tLab.textContent=ts+'×';}}
let simD=0;const sd0=new Date(2026,0,1),dEl=document.getElementById('dd');
const mos=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

/*════════ ANIMATE ════════*/
const clk=new THREE.Clock();
function animate(){requestAnimationFrame(animate);const dt=clk.getDelta(),el=clk.getElapsedTime();let dtt=paused?0:dt*ts;if(liveMode){simD=(Date.now()-sd0.getTime())/864e5;dtt=dt;}else{simD+=dtt*10;}
{const d=new Date(sd0.getTime()+simD*864e5);
if(liveMode){const hh=String(d.getHours()).padStart(2,'0'),mm=String(d.getMinutes()).padStart(2,'0'),ss=String(d.getSeconds()).padStart(2,'0');
dEl.textContent=`${mos[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}  ${hh}:${mm}:${ss}`;}
else{dEl.textContent=`${mos[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;}}
sunM.uniforms.uT.value=el;
bodies.forEach(b=>{const d=b.dd;
if(liveMode){b.ang=b.ang0+(simD/d.p)*2*Math.PI;}else{b.ang+=dtt*(2*Math.PI)/d.p*10;}
const a=d.d*AU,e=d.e,bb=a*Math.sqrt(1-e*e),cx2=a*e;b.mesh.position.set(a*Math.cos(b.ang)-cx2,0,bb*Math.sin(b.ang));if(d.rp!==0){const rs=(2*Math.PI)/Math.abs(d.rp)*(liveMode?dt/86400:dtt*10);b.mesh.rotation.y+=d.rp<0?-rs:rs;}});
// Belt orbits — rotate each belt group around Y
beltGroups.forEach(bg=>{const rs=(2*Math.PI)/bg.p*(liveMode?dt/86400:dtt*10);bg.m.rotation.y+=rs;});
// Moon orbit
if(window._moon){const m=window._moon,p=m.parent;
  if(liveMode){m.ang=(simD/m.period)*2*Math.PI;}else{m.ang+=dtt*(2*Math.PI)/m.period*10;}
  const ew=new THREE.Vector3();p.mesh.getWorldPosition(ew);
  m.mesh.position.set(ew.x+Math.cos(m.ang)*m.orbitR,ew.y+Math.sin(m.ang*.09)*m.orbitR*.09,ew.z+Math.sin(m.ang)*m.orbitR);
  const mrs=(2*Math.PI)/m.period*(liveMode?dt/86400:dtt*10);m.mesh.rotation.y+=mrs;}
// Galilean moons orbit
if(window._jmoons){window._jmoons.forEach(jm=>{
  if(liveMode){jm.ang=(simD/jm.period)*2*Math.PI;}else{jm.ang+=dtt*(2*Math.PI)/jm.period*10;}
  const pw=new THREE.Vector3();jm.parent.mesh.getWorldPosition(pw);
  jm.mesh.position.set(pw.x+Math.cos(jm.ang)*jm.orbitR,pw.y+Math.sin(jm.ang*.05)*jm.orbitR*.05,pw.z+Math.sin(jm.ang)*jm.orbitR);
  const jrs=(2*Math.PI)/jm.period*(liveMode?dt/86400:dtt*10);jm.mesh.rotation.y+=jrs;
  // Move orbit line to follow Jupiter
  if(jm._orbitLine){jm._orbitLine.position.copy(pw);}
});}
if(cT){cT.p+=dt/cT.dur;if(cT.p>=1){cam.position.copy(cT.e);ctl.target.copy(cT.tl);cT=null;}else{const t=cT.p,e=t<.5?4*t**3:1-(-2*t+2)**3/2;cam.position.lerpVectors(cT.s,cT.e,e);ctl.target.lerpVectors(cT.sl,cT.tl,e);}}
if(foc&&!cT){const w=new THREE.Vector3();foc.mesh.getWorldPosition(w);const o=cam.position.clone().sub(ctl.target);ctl.target.lerp(w,.05);cam.position.copy(ctl.target).add(o);}
ctl.update();comp.render();}

addEventListener('resize',()=>{cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();R.setSize(innerWidth,innerHeight);comp.setSize(innerWidth,innerHeight);bloom.resolution.set(innerWidth,innerHeight);});
addEventListener('keydown',e=>{if(e.key===' '){e.preventDefault();bP.click();}if(e.key==='ArrowRight'||e.key==='='||e.key==='+')bF.click();if(e.key==='ArrowLeft'||e.key==='-')bS.click();if(e.key==='Escape')flyAll();const n=parseInt(e.key);if(n>=1&&n<=8)focus(n-1);if(e.key==='0')flySun();});

build();
</script>
